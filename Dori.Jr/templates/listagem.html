<table>
<thead>
    <tr>
        <th>CPF</th>
        <th>Nome</th>
        <th>Ações</th>
    </tr>
</thead>    
<tbody>
    {% for cliente in clientes %}
    <tr>
        <td>{{ cliente.cpf }}</td>
        <td>{{ cliente.nome }}</td>
        <td>
            <a href="{{ url_for ('deletar_cliente', cpf=cliente.cpf=cliente.cpf) }}">Excluir</a>
        </td>
    </tr>
    {% endfor %}
</tbody>
</table>
